catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    '@antfu/ni': ^30.0.0
    bumpp: ^11.0.1
    eslint: ^10.2.0
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.9
    tsx: ^4.21.0
    typescript: ^6.0.2
    vite: ^8.0.8
  inlined:
    '@antfu/utils': ^9.3.0
  prod:
    cac: ^7.0.0
    yaml: ^2.8.3
  testing:
    tsnapi: ^0.3.0
    vitest: ^4.1.4
  types:
    '@types/node': ^25.6.0
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
