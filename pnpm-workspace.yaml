catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    '@antfu/ni': ^30.1.0
    bumpp: ^11.1.0
    eslint: ^10.3.0
    lint-staged: ^17.0.4
    publint: ^0.3.20
    simple-git-hooks: ^2.13.1
    skills-npm: ^1.1.1
    tsdown: ^0.22.0
    tsx: ^4.21.0
    typescript: ^6.0.3
    unrun: ^0.3.0
    vite: ^8.0.11
  inlined:
    '@antfu/utils': ^9.3.0
  prod:
    cac: ^7.0.0
    logs-sdk: 0.0.6
    yaml: ^2.8.4
  testing:
    tsnapi: ^0.3.2
    vitest: ^4.1.5
  types:
    '@types/node': ^25.6.2
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks

allowBuilds:
  esbuild: false
  simple-git-hooks: true
