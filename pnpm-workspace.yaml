catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^9.1.0
    '@antfu/ni': ^30.2.0
    bumpp: ^11.1.0
    eslint: ^10.6.0
    lint-staged: ^17.0.8
    publint: ^0.3.21
    simple-git-hooks: ^2.13.1
    skills-npm: ^1.2.0
    tsdown: ^0.22.4
    tsx: ^4.23.0
    typescript: ^6.0.3
    unrun: ^0.3.1
    vite: ^8.1.3
  inlined:
    '@antfu/utils': ^9.3.0
  prod:
    cac: ^7.0.0
    logs-sdk: 0.0.6
    yaml: ^2.9.0
  testing:
    tsnapi: ^1.0.0
    vitest: ^4.1.10
  types:
    '@types/node': ^25.9.5
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks

allowBuilds:
  esbuild: false
  simple-git-hooks: true
